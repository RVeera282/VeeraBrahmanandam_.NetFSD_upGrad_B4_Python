<!-- Day 6 - JavaScript - R Veera Brahmanandam - Hands On Task

Live Form Validation with Events:

•	Fields: Name, Email, Age - Done
•	Use: onchange, onclick - Done
•	Validate: Name cannot be empty
    Email must contain "@"
    Age must be greater than 18 
•	Store valid user data in sessionStorage - Done

-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Form Validation</title>
</head>
<body>
    
    <h2>Registration Fomr</h2>

    <!-- Name Field -->
    <label>Name: </label> <br>
    <input type="text" id="name" onchange="validateName()" required>
    <span id="nameMsg"></span>
    <br><br>

    <!-- Email Field -->
    <label>Email: </label> <br>
    <input type="text" id="email" onchange="validateEmail()" required>
    <span id="emailMsg"></span>
    <br><br>

    <!-- Age Field -->
    <label>Age:</label> <br>
    <input type="number" id="age" onchange="validateAge()">
    <span id="ageMsg"></span>
    <br><br>

    <!-- Submit button -->
    <button onclick="saveData()">Register</button>
    <p id="finalMsg"></p>

    <script>

        // Name Validation Name cannot be empty
        function validateName() {
            let name = document.getElementById("name").value;
            let msg = document.getElementById("nameMsg")

            if(name === "") {
                msg.innerHTML="Name cannot be empty"; 
                msg.style.color="red";
                return false;
            }

            msg.innerHTML="✔ Valid Name";
            msg.style.color="green";
            return true;
        }

        // Email validation (must contain "@")
        function validateEmail() {
            let email = document.getElementById("email").value;
            let msg = document.getElementById("emailMsg");

            if(!email.includes("@")) {
                msg.innerHTML = "Invalid Email";
                msg.style.color = "red";
                return false;
            }

            msg.innerHTML = "✔ Valid Email";
            msg.style.color = "green";
            return true;
        }

        // Age Validation (must be greater than 18)
        function validateAge() {
            let age = document.getElementById("age").value;
            let msg = document.getElementById("ageMsg");

            if(age <= 18) {
                msg.innerHTML = "Age must be greater than 18";
                msg.style.color = "red";
                return false;
            }

            msg.innerHTML = "✔ Valid Age";
            msg.style.color = "green";
            return true;
        }

        // Onclik event for final submission
        function saveData() {

            // If any validation fails, stops execution
            if(!validateName()) return;
            if(!validateEmail()) return;
            if(!validateAge()) return
            
            // All validations passed - Storing valid data in Session Storage

            sessionStorage.setItem("name", document.getElementById("name").value);
            sessionStorage.setItem("email",document.getElementById("email").value);
            sessionStorage.setItem("age",document.getElementById("age").value);

            let finalMsg = document.getElementById("finalMsg");
            finalMsg.innerHTML = "✔ Registration Successfull in Session Storage";
            finalMsg.style.color = "green";
            
        }
    </script>
</body>
</html>
