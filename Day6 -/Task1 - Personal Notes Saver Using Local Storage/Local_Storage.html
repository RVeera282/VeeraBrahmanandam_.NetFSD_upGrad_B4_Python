<!-- Day 6 - JavaScript - R Veera Brahmanandam - Hands On Tasks 

Personal Notes Saver using LocalStorage

- Text area for writing notes
- Save button using inline onclick
- Clear button
- Display stored note on page load
- Automatically load when page refreshers
- Save notes in localStorage
- Data stored in key-value paired
- Clear note

-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Notes Saver</title>
</head>
<body>

    <!-- Text area for writing notes -->
    <h2>My Daily Notes</h2>
    <textarea id="note" rows="6" cols="40" placeholder="Write your notes here........."></textarea>
    <br><br>

    <!-- Save button using inline onclick -->
    <button onclick="saveNote()">Save</button>

    <!-- Clear button -->
    <button onclick="clearNote()">Clear</button>

    <script>

        /* Display stored note on page laod */
        /* Automatically load when page refreshers */
        window.onload = function() {
            let storedNote = localStorage.getItem("myNote"); /* localStorage.getItem() */
            if(storedNote !== null) {
                document.getElementById("note").value = storedNote;
            }
        };

        // Save note in localStorage
        // Data stored a key value pair
        function saveNote() {
            let noteText = document.getElementById("note").value;
            localStorage.setItem("myNote", noteText); // localStorage.setItem()
            alert("Note saved successfully!");
        }

        // Clear note
        function clearNote() {
            localStorage.removeItem("myNote"); //localStorage.removeItem()
            document.getElementById("note").value=""; // Clears text area
            alert("Note cleared");
        }

    </script>
</body>
</html>
