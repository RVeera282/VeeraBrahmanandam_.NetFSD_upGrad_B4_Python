<!DOCTYPE html>
<html>
<head>
    <title>Mini Expense Tracker</title>
</head>
<body>

    <h2>Mini Expense Tracker</h2>

    <!-- Input Headings -->
    <label><b>Item: </b></label><br>
    <input type="text" id="title" placeholder="Expense Title"><br><br>

    <label><b>Amount: </b></label><br>
    <input type="number" id="amount" placeholder="Amount"><br><br>

    <label><b>Date: </b></label><br>
    <input type="date" id="date"><br><br>

    <!-- Buttons -->
    <button onclick="addExpense()">Add Expense</button>
    <button onclick="viewExpenses()">View Expenses</button>

    <p id="message"></p>

    <br>

    <!-- Expense Table -->
    <table border="1" width="60%" style="justify-content: center;">
    <thead>
        <tr>
        <th>Item</th>
        <th>Amount (₹)</th>
        <th>Date</th>
        <th>Action</th>
        </tr>
    </thead>
    <tbody id="expenseList"></tbody>
    </table>

    <script>
    /* DATABASE CREATION (IndexedDB) */

    let request = indexedDB.open("ExpenseDB", 1);
    let db;

    // CREATE TABLE → objectStore
    request.onupgradeneeded = function (e) {
    db = e.target.result;
    db.createObjectStore("expenses", { keyPath: "id", autoIncrement: true });
    };

    request.onsuccess = function (e) {
    db = e.target.result;
    };

    request.onerror = function () {
    alert("Database Error");
    };

    /* INSERT OPERATION WITH VALIDATION */

    function addExpense() {

    let title = document.getElementById("title").value.trim();
    let amount = document.getElementById("amount").value.trim();
    let date = document.getElementById("date").value.trim();
    let msg = document.getElementById("message");

    // Validation (Prevents empty insert)
    if (title === "" || amount === "" || date === "") {
        msg.innerHTML = "<span style='color:red'>All fields are required!</span>";
        return;
    }

    let transaction = db.transaction("expenses", "readwrite");
    let store = transaction.objectStore("expenses");

    // INSERT → add()
    let expense = { title, amount, date };
    let req = store.add(expense);

    req.onsuccess = function () {
        msg.innerHTML = "<span style='color:green'>Expense successfully added</span>";
        document.getElementById("title").value = "";
        document.getElementById("amount").value = "";
        document.getElementById("date").value = "";
    };

    req.onerror = function () {
        msg.innerHTML = "<span style='color:red'>Error adding expense</span>";
    };
    }

    /* SELECT OPERATION */

    function viewExpenses() {

    let transaction = db.transaction("expenses", "readonly");
    let store = transaction.objectStore("expenses");

    // SELECT → getAll()
    let req = store.getAll();

    req.onsuccess = function () {
        let tbody = document.getElementById("expenseList");
        tbody.innerHTML = "";

        req.result.forEach(exp => {
        let row = `
            <tr>
            <td>${exp.title}</td>
            <td>${exp.amount}</td>
            <td>${exp.date}</td>
            <td>
                <button onclick="deleteExpense(${exp.id})">Delete</button>
            </td>
            </tr>
        `;
        tbody.innerHTML += row;
        });
    };

    req.onerror = function () {
        alert("Error fetching expenses");
    };
    }

    /*  DELETE OPERATION */

    function deleteExpense(id) {

    let transaction = db.transaction("expenses", "readwrite");
    let store = transaction.objectStore("expenses");

    // DELETE → delete()
    store.delete(id);

    transaction.oncomplete = function () {
        viewExpenses();
    };
    }
    </script>

</body>
</html>
