<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Data Fetcher</title>

    <style>
        /* PAGE STYLING */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .weather-container {
            background-color: #ffffff;
            width: 380px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        .output {
            margin-top: 20px;
            padding: 15px;
            background-color: #ecf0f1;
            border-radius: 8px;
            display: none;
        }

        .success {
            color: #2c3e50;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="weather-container">
    <h2> Weather Data Fetcher</h2>

    <!-- City input -->
    <input type="text" id="city" placeholder="Enter City Name">

    <!-- Button to fetch weather -->
    <br>
    <button onclick="getWeather()">Get Weather</button>

    <!-- Output section -->
    <div class="output" id="output"></div>
</div>

<script>
    /* PROMISE VERSION (Requirement: Implement using Promises) */
    const fetchWeatherUsingPromise = (lat, lon) => {
        return fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
            .then(response => {
                if (!response.ok) {
                    throw new Error("Failed to fetch weather data");
                }
                return response.json();
            });
    };

    /* 
       Requirements:
       - async/await
       - arrow functions
       - template literals
       - try/catch error handling
    */
    const getWeather = async () => {
        const city = document.getElementById("city").value.trim();
        const output = document.getElementById("output");

        output.style.display = "block";

        try {
            if (city === "") {
                throw new Error("City name cannot be empty");
            }

            /* Fetch latitude & longitude of city */
            const geoResponse = await fetch(
                `https://geocoding-api.open-meteo.com/v1/search?name=${city}`
            );

            if (!geoResponse.ok) {
                throw new Error("Location not found");
            }

            const geoData = await geoResponse.json();

            if (!geoData.results || geoData.results.length === 0) {
                throw new Error("Invalid city name");
            }

            const { latitude, longitude, name, country } = geoData.results[0];

            /* Fetch weather data using PROMISE function */
            const weatherData = await fetchWeatherUsingPromise(latitude, longitude);

            const weather = weatherData.current_weather;

            /* Display formatted weather report using template literals */
            output.innerHTML = `
                <div class="success">
                    <h3> ${name}, ${country}</h3>
                    <p> Temperature: <b>${weather.temperature}°C</b></p>
                    <p> Wind Speed: <b>${weather.windspeed} km/h</b></p>
                    <p> Wind Direction: <b>${weather.winddirection}°</b></p>
                </div>
            `;

        } catch (error) {
            /* Proper error handling using try/catch */
            output.innerHTML = `<p class="error"> ${error.message}</p>`;
        }
    };
</script>

</body>
</html>
