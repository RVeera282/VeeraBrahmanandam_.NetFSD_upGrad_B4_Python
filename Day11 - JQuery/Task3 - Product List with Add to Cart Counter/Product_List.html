<!DOCTYPE html>
<html>
<head>
    <title>Product List - Add to Cart</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }

        /* Cart counter bar */
        .cart-bar {
            background-color: #222;
            color: #fff;
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        /* Product list */
        .product-list {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        /* Product card */
        .product {
            width: 23%;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .product h3 {
            margin-bottom: 10px;
        }

        .product p {
            color: #555;
            margin-bottom: 12px;
        }

        /* Add / Remove button */
        .cart-btn {
            padding: 8px 14px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Remove button style */
        .cart-btn.remove {
            background-color: #dc3545;
        }

        /* Message */
        .message {
            display: block;
            margin-top: 8px;
            font-size: 13px;
        }

    </style>
</head>
<body>
    <!-- Cart Counter: Cart Counter at top -->
    <div class="cart-bar">
        Cart Items: <span id="cartCount">0</span>
    </div>

    <!-- Product List - Atleast 4 products -->
    <div class="product-list" id="productList">

        <div class="product">
            <h3>Wireless Mouse</h3>
            <p>₹799</p>
            <button class="cart-btn" data-added="false">Add to Cart</button>
            <span class="message"></span>
        </div>

        <div class="product">
            <h3>Keyboard</h3>
            <p>₹999</p>
            <button class="cart-btn" data-added="false">Add to Cart</button>
            <span class="message"></span>
        </div>

        <div class="product">
            <h3>HeadPhones</h3>
            <p>₹1,499</p>
            <button class="cart-btn" data-added="false">Add to Cart</button>
            <span class="message"></span>
        </div>

        <div class="product">
            <h3>USB Cable</h3>
            <p>₹299</p>
            <button class="cart-btn" data-added="false">Add to Cart</button>
            <span class="message"></span>
        </div>
    </div>

    <script>

        $(document).ready(function() {

            // Initial cart count variable
            let cartCount = 0;
            const $cartCounter = $("#cartCount");

            // Event Delegation Used: Use jQuery event delegation if needed
            $("#productList").on("click",".cart-btn", function() {

                const $btn = $(this);
                const $msg = $btn.siblings(".message");

                // Read product state
            const isAdded = $btn.attr("data-added") === "true";

            if (!isAdded) {
                // ===============================
                // ADD TO CART
                // ===============================
                cartCount++;
                $cartCounter.text(cartCount);

                $btn
                    .text("Remove")
                    .addClass("remove")
                    .attr("data-added", "true");

                $msg
                    .text("✔ Added to cart")
                    .css("color", "green");

            } else {
                // ===============================
                // REMOVE FROM CART
                // ===============================
                cartCount--;
                $cartCounter.text(cartCount);

                $btn
                    .text("Add to Cart")
                    .removeClass("remove")
                    .attr("data-added", "false");

                $msg
                    .text("✖ Removed from cart")
                    .css("color", "red");
                }
            });
        });
    </script>
</body>
</html>
