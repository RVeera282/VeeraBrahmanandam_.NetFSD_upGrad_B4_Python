<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="todo-container">
        <h1>My To-Do List</h1>

        <!-- Input section to add tasks -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter your task">
            <button id="addBtn">Add Task</button>
        </div>

        <!-- Task list (tasks will be added dynamically here) -->
        <ul id="taskList"></ul>
    </div>

    <script>

        // DOM ELEMENT SELECTION
        const taskInput = document.getElementById("taskInput");
        const addBtn = document.getElementById("addBtn");
        const taskList = document.getElementById("taskList");

        // FUNCTION: Create a new task
        // Modular & reusable function
        function createTask(taskText) {
            const li = document.createElement("li");
            li.className = "task-item";

            li.innerHTML = `
                <span class="task-text">${taskText}</span>
                <div class="actions">
                    <button class="complete-btn">✔</button>
                    <button class="delete-btn">✖</button>
                </div>
            `;
            return li;
        }

        // ADD TASK (Dynamic DOM Manipulation)
        addBtn.addEventListener("click", () => {
            const taskText = taskInput.value.trim();

            // Prevent empty input
            if (taskText === "") return;

            const taskItem = createTask(taskText);
            taskList.appendChild(taskItem);

            taskInput.value = "";
        });

        // EVENT DELEGATION
        // Single event listener for all tasks
        // Improves performance
        taskList.addEventListener("click", (event) => {

            const target = event.target;
            const taskItem = target.closest(".task-item");

            // Mark task as completed
            if (target.classList.contains("complete-btn")) {
                taskItem.classList.toggle("completed");
            }

            // Delete task
            if (target.classList.contains("delete-btn")) {
                taskItem.remove();
            }
        });

    </script>

</body>
</html>
